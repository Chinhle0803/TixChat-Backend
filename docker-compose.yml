services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tixchat-backend
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CLIENT_URL=${CLIENT_URL}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - DYNAMODB_USERS_TABLE=${DYNAMODB_USERS_TABLE}
      - DYNAMODB_CONVERSATIONS_TABLE=${DYNAMODB_CONVERSATIONS_TABLE}
      - DYNAMODB_MESSAGES_TABLE=${DYNAMODB_MESSAGES_TABLE}
      - DYNAMODB_PARTICIPANTS_TABLE=${DYNAMODB_PARTICIPANTS_TABLE}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE:-7d}
      - JWT_REFRESH_EXPIRE=${JWT_REFRESH_EXPIRE:-30d}
      - AWS_SES_REGION=${AWS_SES_REGION}
      - AWS_SES_SENDER_EMAIL=${AWS_SES_SENDER_EMAIL}
      - AWS_S3_REGION=${AWS_S3_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_AVATAR_FOLDER=${S3_AVATAR_FOLDER}
      - FRONTEND_URLS=${FRONTEND_URLS}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REDIS_ENABLED=${REDIS_ENABLED:-false}
    networks:
      - tixchat-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: tixchat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tixchat-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  tixchat-network:
    driver: bridge

volumes:
  redis_data:
