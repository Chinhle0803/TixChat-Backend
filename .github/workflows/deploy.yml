name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image-tag }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata
        id: meta
        run: |
          IMAGE_TAG=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and push to Amazon ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/tixchat-backend:latest
            ${{ steps.login-ecr.outputs.registry }}/tixchat-backend:${{ steps.meta.outputs.image-tag }}
          no-cache: true

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          script: |
            # 1. Login vào ECR ngay trên máy EC2 (Rất quan trọng)
            aws ecr get-login-password --region ${{ vars.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            # 2. Khai báo biến
            IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
            IMAGE_NAME=$ECR_REGISTRY/tixchat-backend:$IMAGE_TAG

            # 3. Pull image mới
            docker pull $IMAGE_NAME

            # 4. Dừng và xóa container cũ (nếu có)
            docker stop tixchat-backend || true
            docker rm tixchat-backend || true

            # 5. Chạy container mới với đầy đủ biến môi trường
            docker run -d \
              --name tixchat-backend \
              --restart unless-stopped \
              -p 5000:5000 \
              -e NODE_ENV=production \
              -e PORT=5000 \
              -e CLIENT_URL=${{ secrets.CLIENT_URL }} \
              -e AWS_REGION=${{ vars.AWS_REGION }} \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e DYNAMODB_USERS_TABLE=${{ vars.DYNAMODB_USERS_TABLE }} \
              -e DYNAMODB_CONVERSATIONS_TABLE=${{ vars.DYNAMODB_CONVERSATIONS_TABLE }} \
              -e DYNAMODB_MESSAGES_TABLE=${{ vars.DYNAMODB_MESSAGES_TABLE }} \
              -e DYNAMODB_PARTICIPANTS_TABLE=${{ vars.DYNAMODB_PARTICIPANTS_TABLE }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }} \
              -e JWT_EXPIRE=${{ vars.JWT_EXPIRE }} \
              -e JWT_REFRESH_EXPIRE=${{ vars.JWT_REFRESH_EXPIRE }} \
              -e AWS_SES_REGION=${{ vars.AWS_SES_REGION }} \
              -e AWS_SES_SENDER_EMAIL=${{ secrets.AWS_SES_SENDER_EMAIL }} \
              -e AWS_S3_REGION=${{ vars.AWS_S3_REGION }} \
              -e S3_BUCKET_NAME=${{ vars.S3_BUCKET_NAME }} \
              -e S3_AVATAR_FOLDER=${{ vars.S3_AVATAR_FOLDER }} \
              -e FRONTEND_URLS=${{ secrets.FRONTEND_URLS }} \
              -e REDIS_URL=${{ secrets.REDIS_URL }} \
              -e REDIS_ENABLED=${{ vars.REDIS_ENABLED }} \
              $IMAGE_NAME

            # 6. Dọn dẹp các ảnh cũ không dùng đến để tránh đầy ổ cứng EC2
            docker image prune -f