name: Build & Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          script: |
            REPO_DIR="/home/${{ secrets.EC2_USERNAME }}/TixChat-Backend"
            
            # Clone repo nếu chưa có
            if [ ! -d "$REPO_DIR" ]; then
              cd /home/${{ secrets.EC2_USERNAME }}
              git clone https://github.com/Chinhle0803/TixChat-Backend.git
            fi
            
            cd $REPO_DIR

            # Pull code mới nhất
            git pull origin main

            # Build Docker image trực tiếp trên EC2
            docker build --no-cache -t tixchat-backend:latest .

            # Dừng và xóa container cũ (nếu có)
            docker stop tixchat-backend || true
            docker rm tixchat-backend || true

            # Chạy container mới với đầy đủ biến môi trường
            docker run -d \
              --name tixchat-backend \
              --restart unless-stopped \
              -p 5000:5000 \
              -e NODE_ENV=development \
              -e PORT=5000 \
              -e CLIENT_URL=${{ secrets.CLIENT_URL }} \
              -e AWS_REGION=${{ vars.AWS_REGION }} \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e DYNAMODB_USERS_TABLE=${{ vars.DYNAMODB_USERS_TABLE }} \
              -e DYNAMODB_CONVERSATIONS_TABLE=${{ vars.DYNAMODB_CONVERSATIONS_TABLE }} \
              -e DYNAMODB_MESSAGES_TABLE=${{ vars.DYNAMODB_MESSAGES_TABLE }} \
              -e DYNAMODB_PARTICIPANTS_TABLE=${{ vars.DYNAMODB_PARTICIPANTS_TABLE }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }} \
              -e JWT_EXPIRE=${{ vars.JWT_EXPIRE }} \
              -e JWT_REFRESH_EXPIRE=${{ vars.JWT_REFRESH_EXPIRE }} \
              -e AWS_SES_REGION=${{ vars.AWS_SES_REGION }} \
              -e AWS_SES_SENDER_EMAIL=${{ secrets.AWS_SES_SENDER_EMAIL }} \
              -e AWS_S3_REGION=${{ vars.AWS_S3_REGION }} \
              -e S3_BUCKET_NAME=${{ vars.S3_BUCKET_NAME }} \
              -e S3_AVATAR_FOLDER=${{ vars.S3_AVATAR_FOLDER }} \
              -e FRONTEND_URLS=${{ secrets.FRONTEND_URLS }} \
              -e REDIS_URL=${{ secrets.REDIS_URL }} \
              -e REDIS_ENABLED=${{ vars.REDIS_ENABLED }} \
              tixchat-backend:latest

            echo "Deployment completed successfully!"
