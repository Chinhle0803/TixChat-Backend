name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        run: |
          IMAGE_TAG=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "ecr-registry=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_OUTPUT

      - name: Build and push to Amazon ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/tixchat-backend:latest
            ${{ steps.login-ecr.outputs.registry }}/tixchat-backend:${{ steps.meta.outputs.image-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          envs: IMAGE_TAG,ECR_REGISTRY
          script: |
            IMAGE_TAG=$(echo "${{ github.sha }}" | cut -c1-8)
            ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"

            # Pull latest image
            docker pull $ECR_REGISTRY/tixchat-backend:$IMAGE_TAG

            # Stop and remove old container
            docker stop tixchat-backend || true
            docker rm tixchat-backend || true

            # Run new container
            docker run -d \
              --name tixchat-backend \
              --restart unless-stopped \
              -p 5000:5000 \
              -e NODE_ENV=production \
              -e PORT=5000 \
              -e CLIENT_URL=${{ secrets.CLIENT_URL }} \
              -e AWS_REGION=${{ vars.AWS_REGION }} \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e DYNAMODB_USERS_TABLE=${{ vars.DYNAMODB_USERS_TABLE }} \
              -e DYNAMODB_CONVERSATIONS_TABLE=${{ vars.DYNAMODB_CONVERSATIONS_TABLE }} \
              -e DYNAMODB_MESSAGES_TABLE=${{ vars.DYNAMODB_MESSAGES_TABLE }} \
              -e DYNAMODB_PARTICIPANTS_TABLE=${{ vars.DYNAMODB_PARTICIPANTS_TABLE }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }} \
              -e JWT_EXPIRE=${{ vars.JWT_EXPIRE }} \
              -e JWT_REFRESH_EXPIRE=${{ vars.JWT_REFRESH_EXPIRE }} \
              -e AWS_SES_REGION=${{ vars.AWS_SES_REGION }} \
              -e AWS_SES_SENDER_EMAIL=${{ secrets.AWS_SES_SENDER_EMAIL }} \
              -e AWS_S3_REGION=${{ vars.AWS_S3_REGION }} \
              -e S3_BUCKET_NAME=${{ vars.S3_BUCKET_NAME }} \
              -e S3_AVATAR_FOLDER=${{ vars.S3_AVATAR_FOLDER }} \
              -e FRONTEND_URLS=${{ secrets.FRONTEND_URLS }} \
              -e REDIS_URL=${{ secrets.REDIS_URL }} \
              -e REDIS_ENABLED=${{ vars.REDIS_ENABLED }} \
              $ECR_REGISTRY/tixchat-backend:$IMAGE_TAG

            # Cleanup unused images
            docker image prune -f

            echo "Deployment completed successfully"
